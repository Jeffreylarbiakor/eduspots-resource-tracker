<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource & Device Distribution Tracker — EduSpots</title>
  <link rel="icon" href="assets/favicon.ico" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app-shell">

  <!-- =====================================================================
       Sidebar
  ====================================================================== -->
  <aside class="sidebar" role="navigation" aria-label="Main navigation">

    <div class="sidebar-brand">
      <div class="sidebar-logo-plate">
        <img src="assets/eduspots-logo-horz.svg" alt="EduSpots" width="160" height="38" />
      </div>
      <p class="sidebar-app-name">Resource &amp; Device Tracker</p>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-link active" data-view="overview" aria-current="page">
        <span class="nav-icon">📊</span> Overview
      </button>
      <button class="nav-link" data-view="grid">
        <span class="nav-icon">🗺️</span> Spot resourcing grid
      </button>
      <button class="nav-link" data-view="requests">
        <span class="nav-icon">📋</span> Requests &amp; fulfilment
      </button>
      <button class="nav-link" data-view="flagged">
        <span class="nav-icon">⚠️</span> Under-resourced Spots
      </button>
    </nav>

    <div class="sidebar-footer">
      <p class="sidebar-footer-text">
        Prototype — synthetic data<br />
        EduSpots operations portfolio<br />
        Project 5 of 5
      </p>
    </div>

  </aside>

  <!-- =====================================================================
       Main content
  ====================================================================== -->
  <main class="main" id="main" role="main">
    <div class="main-inner">
      <div id="mainContent">
        <!-- Rendered by app.js -->
      </div>
    </div>
  </main>

</div>

<!-- =========================================================================
     Modal overlay
========================================================================== -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Detail panel">
  <div class="modal" id="modal">
    <!-- Rendered by app.js on demand -->
  </div>
</div>

<!-- =========================================================================
     Scripts — load order matters: real-data → data → charts → app
========================================================================== -->
<script src="js/real-data.js"></script>
<script src="js/data.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>

</body>
</html>
